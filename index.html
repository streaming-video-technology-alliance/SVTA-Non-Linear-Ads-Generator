<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVTA Non-Linear Ad Layout Generator</title>
    <link rel="stylesheet" href="styles.css">
    <!--<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css">-->
</head>
<body>
    <div class="container">
        <!-- Preview Player Section -->
        <section class="preview-section">
            <div class="preview-header">
                <h2>Preview Player</h2>
                <div class="player-dimensions-container">
                    <div class="player-dimensions-inputs">
                        <input type="number" id="playerWidth" class="player-dimension-input" min="1" placeholder="Width">
                        <span class="dimension-separator">×</span>
                        <input type="number" id="playerHeight" class="player-dimension-input" min="1" placeholder="Height">
                    </div>
                    <button id="playerSizeToggle" class="player-size-toggle" title="Toggle player size lock" aria-label="Toggle player size lock">
                        <span class="toggle-icon">🔓</span>
                    </button>
                    <button id="playerFullscreen" class="player-size-toggle" title="Set player to 1920×1080 and lock" aria-label="Set player to full screen size">
                        <span class="toggle-icon">⛶</span>
                    </button>
                </div>
            </div>
            <div class="player-container">
                <div id="previewPlayer" class="preview-player">
                    <div id="primaryContent" class="primary-content">
                        <div class="content-label">Primary Content</div>
                    </div>
                    <div id="overlayContainer" class="overlay-container"></div>
                    <svg id="annotationSvg" class="annotation-svg"></svg>
                </div>
            </div>
        </section>

        <!-- Asset Form Section -->
        <section class="asset-form-section">
            <h2>Asset Form</h2>
            <div class="form-controls">
                <div class="asset-form-header-row">
                    <div class="form-group form-group-inline">
                        <label for="adType">adType:</label>
                        <select id="adType" class="form-control">
                            <option value="linear">linear</option>
                            <option value="multiView">multiView</option>
                            <option value="overlay" selected>overlay</option>
                            <option value="lowerThirdOverlay">lowerThirdOverlay</option>
                            <option value="squeezebackFrame">squeezebackFrame</option>
                            <option value="squeezebackDoubleBox">squeezebackDoubleBox</option>
                            <option value="squeezebackLShape">squeezebackLShape</option>
                            <option value="pauseAd">pauseAd</option>
                        </select>
                    </div>
                    <button id="addAssetBtn" class="btn-primary">ADD ASSET</button>
                </div>
            </div>
            <div id="primaryContentForm" class="primary-content-form-container"></div>
            <div id="assetForms" class="asset-forms-container"></div>
        </section>

        <!-- Asset List Preview Section -->
        <section class="asset-preview-section">
            <div class="asset-preview-header">
                <h2>Asset List Preview</h2>
                <div class="format-toggle" role="radiogroup" aria-label="Asset list format">
                    <label class="format-option">
                        <input type="radio" id="assetFormatHls" name="assetListFormat" value="hls" checked>
                        HLS
                    </label>
                    <label class="format-option">
                        <input type="radio" id="assetFormatDash" name="assetListFormat" value="dash">
                        DASH
                    </label>
                </div>
            </div>
            <pre class="json-preview"><code id="jsonPreview" class="language-json"></code></pre>
        </section>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
